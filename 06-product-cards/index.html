<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>დავალება 6 - პროდუქტების ბარათები</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ჩვენი პროდუქცია</h1>

  <!-- auto-fit აავტომატურად არეგულირებს სვეტების რაოდენობას ეკრანის მიხედვით -->
  <div class="products">
    <div class="card">
      <img src="https://picsum.photos/id/1/250/200" alt="">
      <h3>ყურსასმენი</h3>
      <p class="price">₾ 120</p>
      <button>ყიდვა</button>
    </div>
    <div class="card">
      <img src="https://picsum.photos/id/2/250/200" alt="">
      <h3>კლავიატურა</h3>
      <p class="price">₾ 250</p>
      <button>ყიდვა</button>
    </div>
    <div class="card">
      <img src="https://picsum.photos/id/3/250/200" alt="">
      <h3>მაუსი</h3>
      <p class="price">₾ 80</p>
      <button>ყიდვა</button>
    </div>
    <div class="card">
      <img src="https://picsum.photos/id/4/250/200" alt="">
      <h3>მონიტორი</h3>
      <p class="price">₾ 900</p>
      <button>ყიდვა</button>
    </div>
    <div class="card">
      <img src="https://picsum.photos/id/5/250/200" alt="">
      <h3>ვებკამერა</h3>
      <p class="price">₾ 180</p>
      <button>ყიდვა</button>
    </div>
    <div class="card">
      <img src="https://picsum.photos/id/6/250/200" alt="">
      <h3>დინამიკი</h3>
      <p class="price">₾ 300</p>
      <button>ყიდვა</button>
    </div>
  </div>
</body>
</html>
