<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <title>დავალება 13 - კალენდარი</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calendar">
    <header class="cal-header">
      <button>‹</button>
      <h2>მაისი 2026</h2>
      <button>›</button>
    </header>

    <!-- კვირის დღეები -->
    <div class="weekdays">
      <div>ორშ</div><div>სამ</div><div>ოთხ</div><div>ხუთ</div>
      <div>პარ</div><div>შაბ</div><div>კვი</div>
    </div>

    <!-- დღეები - მაისი 2026 იწყება პარასკევს (5-ე სვეტი) -->
    <div class="days">
      <!-- პირველი დღე grid-column-start: 5 (პარასკევი) -->
      <div class="day start">1</div>
      <div class="day">2</div>
      <div class="day">3</div>
      <div class="day">4</div>
      <div class="day">5</div>
      <div class="day event">6<span>•</span></div>
      <div class="day">7</div>
      <div class="day">8</div>
      <div class="day">9</div>
      <div class="day">10</div>
      <div class="day event">11<span>•</span></div>
      <div class="day">12</div>
      <div class="day">13</div>
      <div class="day">14</div>
      <div class="day">15</div>
      <div class="day">16</div>
      <div class="day">17</div>
      <div class="day">18</div>
      <div class="day">19</div>
      <div class="day">20</div>
      <div class="day">21</div>
      <div class="day">22</div>
      <div class="day">23</div>
      <div class="day">24</div>
      <div class="day">25</div>
      <div class="day today">26</div>     <!-- დღევანდელი დღე -->
      <div class="day event">27<span>•</span></div>
      <div class="day">28</div>
      <div class="day">29</div>
      <div class="day">30</div>
      <div class="day">31</div>
    </div>
  </div>
</body>
</html>
